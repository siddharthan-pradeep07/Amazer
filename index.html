<html>
    <head>
    <title>Amazer</title>  
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">  
        <style>
            body
            {
              margin: 0;
              padding: 2rem;
              font-family: sans-serif;
              background: #2b2b2b;
            }
            .box
            {
                width: 700px;
                height: 700px;
                margin-left: 2rem;
                border-radius: 16px;
                border: 1px solid #3f3f3f;
                background: #272727;
                padding: 1.5rem;
            }
            button
            {
                width:250px;
                height:70px;
                margin-right: 2rem;
                border-radius: 16px;
                color: rgb(255, 232, 198);
                font-size: 28px;
                font-family: Instrument Serif;
                border: 1px solid #3f3f3f;
                background: #272727;
            }
            button:hover
            {
                cursor: pointer;
                background: #2b2929;
            }
            .layout
            {
                display: flex;
                align-items: flex-start;
                gap: 24px;
            }
            .side
            { 
                display: flex;
                flex-direction: column;
                gap:10px;
            }
        </style>
    </head>
    <body>
        <div class="layout">
            <div class="box">
                <canvas id="cv"></canvas>
            </div> 
            <div class="side">
                <button>generate maze</button>
                <button>find shortest path</button>
            </div>
        </div>
    </body>
</html>
