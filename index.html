<html>
    <head>
        <style>
            body
            {
              margin: 0;
              padding: 2rem;
              font-family: sans-serif;
              background: #2b2b2b;
            }
            .box
            {
                width: 700px;
                height: 700px;
                margin-left: 2rem;
                border-radius: 16px;
                border: 1px solid #3f3f3f;
                background: #272727;
                padding: 1.5rem;
            }
            button
            {
                width:250px;
                height:70px;
                margin-right: 2rem;
                border-radius: 16px;
                color: rgb(255, 232, 198);
                border: 1px solid #3f3f3f;
                background: #272727;
            }
            button::hower
            {
                cursor: pointer;
                background: #663636;
            }
            .layout
            {
                display: flex;
                align-items: flex-start;
                gap: 24px;
            }
            .side
            { 
                display: flex;
                flex-direction: column;
                gap:10px;
            }
        </style>
    </head>
    <body>
        <div class="layout">
            <div class="box">
                <canvas id="cv"></canvas>
            </div> 
            <div class="side">
                <button>Test1</button>
                <button>Test2</button>
            </div>
        </div>
    </body>
</html>
