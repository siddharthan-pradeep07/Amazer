<html>
<head>
    <title>Amazer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        body 
        {
            margin: 0;
            padding: 1vw;
            font-family: sans-serif;
            background: #a19b9b;
            height: 100vh;

        .box

        {
            color: #ffffff;

            font-size: 1.1vw;
            border: 3px solid #686981;
            border-radius: 1vw;
            padding: 0.8vw;
            /* display: flex; */
            /* justify-content: space-between; */
        }
        .dir-box
        {
            color: #ffffff;
            font-family: Instrument Serif;
            font-size: 1.1vw;
            border: 3px solid #686981;
            border-radius: 1vw;
            padding: 0.8vw;
            width: 22vw;
            height: 44vw; 
            overflow-y: auto;
            display: flex;
            flex: 1;
            min-width: 0;
            flex-direction: column;
            box-sizing: border-box;
            /* max-height: 80vh; */

        }

        .dir-toggle
        {
            display:flex;
            background: #30303059;

        {
            flex: 1;

            font-size: 1vw;
            border-radius: 20px;
            border: 1px solid #686981;
            background:#292626;
            color: #aaaaaafb;
            cursor: pointer;
        }
        /* .toggle-btn.active
        {
            background: #353433;
            color: #ffffff;
        } */

        .dir-inner
        {
            margin: 0.5vw 0.2vw 0.2vw 0.2vw;
            border: 1px solid #3f3f3f;
            border-radius: 0.8vw;
            padding: 0.8vw;
            flex: 1;
            overflow-y: auto;
            line-height: 2;
            min-height: 10vw;
            background: #272727;
        }

        .copy-btn
        {
            height: 1.8vw;
            width: 7vw;
            font-size: 1vw;
            font-family: Instrument Serif;
            border-radius: 967px;
            border: 1px solid #3f3f3f;
            background:#272727;
            color: #ffffff;
            cursor: pointer;
            margin-right:0;
        }
        .copy-btn:hover
        {
            background: #292626;
        }

        .box
        {
          width: 36vw;
          height: 36vw;
        }

        .bottom-box
        {
            width: auto;
            height: auto;
            border-radius: 1vw;
            border: 2px solid #686981;
            background: #27272700;
            color: #ffffff;
            font-family: Instrument Serif;
            font-size: 1.1vw;
            padding: 0.8vw;
            box-sizing: border-box;
            margin-left: 0;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 0.5vw;
        }

        .mazeid-box
        {
            display: flex;
            gap: 0.2vw;
            /* flex-direction: column; */
            align-items: center;
        }

        .mazeid-buttons
        {
            display: flex;
            gap: 0.5vw;
            width: 100%;
        }
        .mazeid-buttons .mazebtn
        {
            flex: 1;
        }

        #mazeIdInput
        {
            flex: 1;
            padding: 0.5vw;
            background: #272727;
            border: 1px solid #686981;
            border-radius: 1vw;
            color: #ffffff;
            font-family: Instrument Serif;
            font-size: 0.9vw;
            box-sizing: border-box;
        }
        #mazeidinput::placeholder
        {
            color: #949494;
        }
        .mazebtn
        {
            height: 2.4vw ;
            padding: 0 0.8vw;
            background:#272727;
            border: 1px solid #686981;
            border-radius:1vw;
            color: #ffffff;
            font-size: 0.9vw;
            cursor: pointer;
            white-space: mowrap;
        }
        .mazebtn:hover
        {
            color: #cec9c9;
            background: #2b2929;
        }


    </style>
</head>

<body>
    <div class="layout">
       <div style="display: flex; flex-direction: column; gap: 1vw;">
        <div class="box">
            <canvas id="cv"></canvas>
        </div>
        <div style="display: flex; flex-direction: row; gap: 1vw;">
            <div class="bottom-box" style="flex: 1;">
                <button onclick="simulateLeftwallFollowingAlgorithm()" style="width: 100%; font-size: 1vw; border: none; color: #ffffff; background:#272727; ">Simulate left wall following</button>
                <button onclick="simulateRightwallFollowingAlgorithm()" style="width: 100%; font-size: 1vw; border: none; color: #ffffff; background:#272727; ">Simulate right wall following</button>
                <button onclick="runPathAnime()" style="width: 100%; font-size: 1vw; border: none; color: #ffffff; background:#272727; ">Run simulation (shortest path)</button>
            </div>
            <div class="bottom-box" style="flex: 1;">
                <input type="text" id="mazeIdInput" placeholder="Paste Maze ID." style="width: 100%; padding: 0.5vw; background: #272727; border: 1px solid #686981; border-radius: 1vw; color: #ffffff; font-family: Instrument Serif; font-size: 0.9vw; box-sizing: border-box;">
                <div style="display: flex; gap: 0.5vw; border-radius: 1vw;">
                    <button class="mazebtn" onclick="copymazeID()" style="flex: 1;">Copy</button>
                    <button class="mazebtn" onclick="loadmazeID()" style="flex: 1;">Load</button>
                </div>
            </div>
        <!-- </div> -->
       </div>
        </div>
        <div class="side">

        <div class= "btn-group">
            <button onclick="generate()">Generate maze</button>
            <button onclick="solve()">find path (shortest)</button>
            <button onclick="showDirections(dirMode)"><b><i>Generate raw direction code.</i></b></button>
        </div>

        <div class = "btn-group">    
            <button style="border: 2px solid #e75151" onclick="pathCells=[]; isanimating = false; animationPathind = 0; resetStats(); draw();">Clear path</button>
        </div>

        <div class="btn-group">  
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8vw;">
               <button style="width:100%; min-width:0; border: 2px solid #e75151;" onclick="clearAllWalls()">Clear all walls</button>
               <button style="width:100%; min-width:0; border: 2px solid #e75151" onclick="addAllWalls()">Add all walls</button>
               <button style="width:100%; min-width:0;" onclick="toggleDeadEnds()">Dead Ends</button>
               <button style="width:100%; min-width:0;" onclick="window.open('https://github.com/siddharthan-pradeep07/Amazer/blob/main/README.md', '_blank')">Read docx.</button>
            </div>
        </div>

            <div class="info-box">
                <B>Path Data:</B>
                <div>Total cells:<span id="sCells"> —</span></div>
                <div>Right turns:<span id="sRight"> —</span></div>
                <div>Left turns:<span id="sLeft"> —</span></div>
                <div>Straights:<span id="sStraight"> —</span></div>
                <div>Dead ends: <span id="sDeadEnds"> —</span></div>
                <div style=" padding-top: 0.5vw">Time Taken: <span id="sTime">—</span>s</div>
            </div>

        <div class="info-box" style="padding: 0.5vw; font-size: 1vw;">  
            <p style="margin: 0.2vw 0;"><b><i>Click the walls to edit the maze.</i></b></p>
            <p style="margin: 0.2vw 0;"><b><i>Amazer by siddharthan</i></b></p>
        </div>

        </div>

       <div class="dir-box" id="dirbox">
         <div style="display:flex; justify-content:space-between; align-items:center;">
             <b>Directions [Start to finish]</b>
             <button class="copy-btn" onclick="copyDirections()">Copy</button>
         </div>
         <div class="dir-toggle">
            <button class="toggle-btn active" id="btnRaw" onclick= "switchMode('raw')">Raw</button>
            <button class="toggle-btn" id="btnCode" onclick= "switchMode('code')">Code</button>
         </div>
         <div class="dir-inner" id="dirContent">
            Click find path, and then click generate raw code.
        </div>
       </div>

    </div>

    <script>
        const N = 16, CELL = 26, W = 2;
        const SZ = N * CELL + W;
        const cv = document.getElementById('cv');
        cv.width = SZ; cv.height = SZ;
        const ctx = cv.getContext('2d');

        function resize() 
        {
            const box = cv.parentElement;
            const style = getComputedStyle(box);
            const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
            const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
            const size = Math.min(box.clientWidth - padX, box.clientHeight - padY);
            cv.style.width = size + 'px';
            cv.style.height = size + 'px';
        }

        resize();
        window.addEventListener('resize', resize);

        const hWalls = Array.from({ length: N + 1 }, () => Array(N).fill(true));
        const vWalls = Array.from({ length: N }, () => Array(N + 1).fill(true));

        let pathCells = [];

        function solve() {
            isanimating = false;
            animationPathind = 0;
            const finish = new Set([[7, 7], [7, 8], [8, 7], [8, 8]].map(([r, c]) => r * N + c));
            const prev = Array.from({ length: N }, () => Array(N).fill(null));
            const seen = Array.from({ length: N }, () => Array(N).fill(false));
            const q = [[0, 0]];
            seen[0][0] = true;

            while (q.length) {
                const [r, c] = q.shift();
                if (finish.has(r * N + c)) {
                    const path = [];
                    let cur = [r, c];
                    while (cur) 
                    {
                        path.unshift(cur); cur = prev[cur[0]][cur[1]];
                    }
                    pathCells = path;
                    
                    const s = analyzePathStats(path);
                    document.getElementById('sCells').textContent = path.length;
                    document.getElementById('sRight').textContent = s.right;
                    document.getElementById('sLeft').textContent = s.left;
                    document.getElementById('sStraight').textContent = s.straight;
                    time();
                    draw();
                    return;
                }
                for (const [nr, nc, open] of 
                [
                    [r - 1, c, !hWalls[r][c]],
                    [r + 1, c, !hWalls[r + 1][c]],
                    [r, c - 1, !vWalls[r][c]],
                    [r, c + 1, !vWalls[r][c + 1]],
                ]) {
                    if (nr < 0 || nr >= N || nc < 0 || nc >= N || !open || seen[nr][nc]) continue;
                    seen[nr][nc] = true; prev[nr][nc] = [r, c]; q.push([nr, nc]);
                }
            }
            pathCells = [];
            draw();
        }

            let dirMode = 'raw';

            function switchMode(mode)
            {
                dirMode = mode;
                document.getElementById('btnRaw').classList.toggle('active', mode === 'raw');
                document.getElementById('btnCode').classList.toggle('active', mode === 'raw');
                showDirections(dirMode);
            }

            function showDirections(mode)
            {
                if (pathCells.length < 2)
                {
                    document.getElementById('dirContent').innerHTML = 'First click "find path (shortest)" ';
                    return;
                }
                const tm =
                {
                    N: { E: 'right', W: 'left', N: 'straight', S: 'straight' },
                    E: { S: 'right', N: 'left', E: 'straight', W: 'straight' },
                    W: { N: 'right', S: 'left', W: 'straight', E: 'straight' },
                    S: { W: 'right', E: 'left', S: 'straight', N: 'straight' },
                };

                function dir(a, b) 
                {
                    const dr = b[0]-a[0], dc = b[1]-a[1];
                    return dr<0?'N':dr>0?'S':dc>0?'E':'W';
                }
                const steps = ['straight'];
                   for (let i = 1; i < pathCells.length - 1; i++) 
                {
                   const d1 = dir(pathCells[i-1], pathCells[i]);
                   const d2 = dir(pathCells[i], pathCells[i+1]);
                   steps.push(tm[d1]?.[d2] || 'straight');
                }
                steps.push('straight');


                if(mode=== 'raw')
                {
                    const raw = steps.map((s,i) => `${i+1}. ${s}`).join('<br>');
                    document.getElementById('dirContent').innerHTML = raw;
                }
                else
                {
                    const arr = steps.map(s => `"${s}"`).join(', ');
                    const code =
                    `const char* DIRECTIONS[] = {\n  ${arr}\n};\nconst int TOTAL_STEPS = ${steps.length};\nint currentStep = 0;\nbool directionMode = true;\n//paste this snipet in your code to run the exact directions.`;            // Used claude for getting the c++ code.
                         document.getElementById('dirContent').innerHTML =
                              `<pre style="font-size:0.9vw; white-space:pre-wrap; color:#eca221;">${code}</pre>`;
                }
            }

        let leftFollowPath = [];
        let animationPathind = 0;
        let isanimating = false;

        function runPathAnime()
        {
            pathCells = [];
            animationPathind = 0;
            isAnimating = false;
            leftFollowPath = [];
            solve();

            if (pathCells.length < 2) return;

            isanimating = true;
            animationPathind = 0;
            const animeSpeed = 48;

            function animateStep()
            {
                if(animationPathind < pathCells.length)
                {
                    animationPathind++;
                    draw();
                    setTimeout(animateStep, animeSpeed);
                }
                else
                {
                    isanimating = false;
                }
            }
            animateStep();
        }

        function simulateLeftwallFollowingAlgorithm() //scariest function.
        {
            leftFollowPath = [];
            let r = 0, c = 0;
            let facing = 'E'; 
            const visited = new Set();
            visited.add(`${r},${c}`);
            leftFollowPath.push([r,c]);

            const dirs = {E: [0,1], S:[1,0], W:[0,-1], N:[-1,0]};
            const left = {E:'N', N:'W', W:'S', S:'E'};     // used claude
            const right = {E:'S', S:'W', W:'N', N:'E'};    // ^^^^^
            const turnAround = {E:'W', W:'E', N:'S', S:'N'};

            //finish area config
            const finisharea = new Set([[7,7],[7,8],[8,7],[8,8]].map(([r, c]) => r * N + c));

            for (let i = 0; i < 10000; i++)
            {
                if(finisharea.has(r * N +c))
                {
                    leftFollowPath.push([r,c]);
                    draw();
                    return;
                }

                const tryDirs = 
                [
                    left[facing],
                    facing, 
                    right[facing],
                    turnAround[facing]                  
                ];
                let found = false;
                for(const nextFace of tryDirs)
                {
                    const [dr, dc] = dirs[nextFace];
                    const nr = r + dr, nc = c + dc;

                   if (nr < 0 || nr >= N || nc < 0 || nc >= N) continue;
                   if(canMove(r,c,nr,nc)===false) continue;
            
                       r = nr;
                       c = nc;
                       //leftFollowPath.push([r,c]);
                       facing = nextFace;

                    //    if (!visited.has(`${r},${c}`))
                    //    {
                    //       visited.add(`${r},${c}`);
                    //       leftFollowPath.push([r,c]);
                    //    }
                    //    else if (r===0 && c === 0)
                    //    {
                    //         draw();
                    //         return;
                    //    }                       
                       leftFollowPath.push([r,c]);
                       found = true;
                       break;
                }  
                if(!found) break; 
            }
            draw();
        }   
        
        function simulateRightwallFollowingAlgorithm()
        {
            leftFollowPath=[];
            isanimating = false;
            animationPathind = 0;
            let r = 0, c =0;
            let facing = 'E';
            const visited = new Set();
            visited.add(`${r},${c}`);
            leftFollowPath.push([r,c]);

            const dirs = {E: [0,1], S:[1,0], W:[0,-1], N:[-1,0]};
            const left = {E:'N', N:'W', W:'S', S:'E'};
            const right = {E:'S', S:'W', W:'N', N:'E'};
            const turnAround = {E:'W', W:'E', N:'S', S:'N'};

            const finisharea = new Set([[7,7],[7,8],[8,7],[8,8]].map(([r, c]) => r * N + c));

            for (let i = 0; i < 10000; i++)
            {
                if(finisharea.has(r * N +c))
                {
                    leftFollowPath.push([r,c]);
                    draw();
                    return;
                }

                const tryDirs = 
                [
                    right[facing],    // Changed to right first
                    facing, 
                    left[facing],     // Changed to left second
                    turnAround[facing]                  
                ];
                let found = false;
                for(const nextFace of tryDirs)
                {
                    const[dr,dc] = dirs[nextFace];
                    const nr =r + dr, nc = c + dc;

                    if(nr < 0 || nr >= N || nc < 0 || nc >= N) continue;
                    if(canMove(r,c,nr,nc) === false) continue;

                    r = nr;
                    c = nc;
                    facing = nextFace;
                    leftFollowPath.push([r,c]);
                    found = true;
                    break;
                }
                if(!found) break;
            } 
            draw();   
        }
    
        

        function canMove(r1,c1,r2,c2)
        {
            if (r2 < r1) return !hWalls[r1][c1];
            if (r2 > r1) return !hWalls[r1+1][c1];
            if (c2 < c1) return !vWalls[r1][c1];
            if (c2 > c1) return !vWalls[r1][c1+1];
            return false;
        }
        

        function copyDirections()
        {
            const el = document.getElementById('dirContent');
            const text = el.innerText;
            navigator.clipboard.writeText(text).then(() =>
            {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'code copied';
                setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        }

        function resetStats() 
        {
            ['sCells', 'sRight', 'sLeft', 'sStraight'].forEach(id => 
            {
                document.getElementById(id).textContent = '—';
            });
        }

        function draw() 
        {
            ctx.fillStyle = '#232633'; // cell side clr
            ctx.fillRect(0, 0, SZ, SZ);

            for (let r = 0; r < N; r++)
                for (let c = 0; c < N; c++) {
                    ctx.fillStyle = '#272a36'; // cell clr
                    ctx.fillRect(W + c * CELL, W + r * CELL, CELL - W, CELL - W);
                }
            ctx.fillStyle = '#b1bbcf'; // wall clr
            for (let r = 0; r <= N; r++)
                for (let c = 0; c < N; c++)
                    if (hWalls[r][c]) ctx.fillRect(W + c * CELL, r * CELL, CELL - W, W);

            for (let r = 0; r < N; r++)
                for (let c = 0; c <= N; c++)
                    if (vWalls[r][c]) ctx.fillRect(c * CELL, W + r * CELL, W, CELL - W);

            for (let r = 0; r <= N; r++)
                for (let c = 0; c <= N; c++)
                    ctx.fillRect(c * CELL, r * CELL, W, W);

            //start cell label green clr
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(W, W, CELL - W, CELL - W);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'Instrument Serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('S', W + (CELL - W) / 2, W + (CELL - W) / 2);

            //end cell x4 label red clr
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(W + 7 * CELL, W + 7 * CELL, 2 * (CELL - W) + W, 2 * (CELL - W) + W);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'Instrument Serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('F', W + 7 * CELL + (CELL - W + W), W + 7 * CELL + (CELL - W + W));

            if (pathCells.length > 1) 
            {
                ctx.save();
                ctx.strokeStyle = '#eca221';
                ctx.lineWidth = 1.4;
                ctx.lineJoin = ctx.lineCap = 'round';
                ctx.beginPath();
                const drawlimit = isanimating ? animationPathind : pathCells.length;
                for (let i = 0; i < drawlimit; i++) {
                    const x = W + pathCells[i][1] * CELL + (CELL - W) / 2;
                    const y = W + pathCells[i][0] * CELL + (CELL - W) / 2;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.restore();
            }

            if(leftFollowPath.length > 1)
            {
                ctx.save();
                ctx.strokeStyle = '#ff6b9c9c';
                ctx.lineWidth = 1.2;
                ctx.lineJoin = ctx.lineCap = 'round';
                ctx.setLineDash([3,3]);
                ctx.beginPath();
                for (let i = 0; i < leftFollowPath.length; i++)
                {
                    const x = W + leftFollowPath[i][1]*CELL + (CELL-W)/2;
                    const y = W + leftFollowPath[i][0]*CELL + (CELL-W)/2;
                    i ===0? ctx.moveTo(x,y) : ctx.lineTo(x,y);
                }
                ctx.stroke();
                ctx.restore();
            }

            if (showDeadEnds)
            {
                for(let r = 0; r < N; r++)
                {
                    for(let c = 0; c < N; c++)
                    {
                        if(isDeadEnd(r, c))
                        {
                            ctx.fillStyle = '#5b84cfb2';
                            ctx.fillRect(W + c*CELL, W + r*CELL, CELL-W, CELL-W);
                        }
                    }
                }
            }

            let deadEndCount = 0;
            for(let r = 0; r < N; r++)
               for(let c = 0; c < N; c++)
                  if (isDeadEnd(r,c)) deadEndCount++;
            document.getElementById('sDeadEnds').textContent = deadEndCount;       
        }

        function clearAllWalls() 
        {
            for (let r = 0; r <= N; r++)
                for (let c = 0; c < N; c++)
                    if (r !== 0 && r !== N) hWalls[r][c] = false;

            for (let r = 0; r < N; r++)
                for (let c = 0; c <= N; c++)
                    if (c !== 0 && c !== N) vWalls[r][c] = false;


            isanimating = false;
            pathCells = [];
            leftFollowPath = [];
            animationPathind = 0;
            draw();
        }
        function addAllWalls()
        {
            for(let r = 1; r < N; r++)
               for(let c =0; c < N; c++)
                  hWalls[r][c] = true;

            for(let r = 0; r < N; r++)
               for(let c = 1; c < N; c++)
                  vWalls[r][c] = true; 
            
            isanimating = false;
            pathCells = [];
            leftFollowPath = [];
            animationPathind = 0;      
            draw();      
        }

        function lockFinishWalls() 
        {
            hWalls[7][7] = true; hWalls[7][8] = true;
            hWalls[9][7] = true; hWalls[9][8] = true;
            vWalls[7][7] = true; vWalls[7][9] = true;
            vWalls[8][7] = true; vWalls[7][7] = true;
            hWalls[8][7] = false; hWalls[8][8] = false;
            vWalls[7][8] = false; vWalls[8][8] = false;
        }

        function generate() 
        {
            pathCells = [];
            isanimating = false;
            leftFollowPath = [];
            animationPathind = 0;
            for (let r = 0; r <= N; r++) for (let c = 0; c < N; c++) hWalls[r][c] = true;
            for (let r = 0; r < N; r++) for (let c = 0; c < + N; c++) vWalls[r][c] = true;
            const visited = Array.from({ length: N }, () => Array(N).fill(false));
            [[7, 7], [7, 8], [8, 7], [8, 8]].forEach(([r, c]) => visited[r][c] = true);
            const stack = [[0, 0]];
            visited[0][0] = true;
            const dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]];

            while (stack.length) {
                const [r, col] = stack[stack.length - 1];
                const sh = dirs.slice().sort(() => Math.random() - 0.5);
                let moved = false;
                for (const [dr, dc] of sh) {
                    const nr = r + dr, nc = col + dc;
                    if (nr >= 0 && nr < N && nc >= 0 && nc < N && !visited[nr][nc]) 
                    {
                        visited[nr][nc] = true;
                        if (dr === 0) vWalls[r][dc > 0 ? col + 1 : col] = false;
                        else hWalls[dr > 0 ? r + 1 : r][col] = false;
                        stack.push([nr, nc]);
                        moved = true; break;
                    }
                }
                if (!moved) stack.pop();
            }

            lockFinishWalls();

            const borders =
                [
                    { type: 'h', r: 7, c: 7 }, { type: 'h', r: 7, c: 8 },
                    { type: 'h', r: 9, c: 7 }, { type: 'h', r: 9, c: 8 },
                    { type: 'v', r: 7, c: 7 }, { type: 'v', r: 7, c: 9 },
                    { type: 'v', r: 8, c: 7 }, { type: 'v', r: 8, c: 9 },
                ].sort(() => Math.random() - 0.5);

            const entryWall = borders[0];

            if (entryWall.type === 'h') hWalls[entryWall.r][entryWall.c] = false;
            else vWalls[entryWall.r][entryWall.c] = false;



            draw();
        }

        function analyzePathStats(path) 
        {
            const tm =
            {
                N: { E: 'right', W: 'left', N: 'straight', S: 'straight' },
                E: { S: 'right', N: 'left', E: 'straight', W: 'straight' },
                W: { N: 'right', S: 'left', W: 'straight', E: 'straight' },
                S: { W: 'right', E: 'left', S: 'straight', N: 'straight' },
            };

            function dir(a, b) 
            {
                const dr = b[0] - a[0], dc = b[1] - a[1];
                return dr < 0 ? 'N' : dr > 0 ? 'S' : dc > 0 ? 'E' : 'W';
            }
            let right = 0, left = 0, straight = 0;
            for (let i = 1; i < path.length - 1; i++) {
                const t = tm[dir(path[i - 1], path[i])]?.[dir(path[i], path[i + 1])] || 'straight';
                if (t === 'right') right++;
                else if (t === 'left') left++;
                else straight++;
            }
            return { right, left, straight };
        }

        let showDeadEnds = false;

        function toggleDeadEnds()
        {
            showDeadEnds = !showDeadEnds;
            draw();
        }

        function isDeadEnd(r, c)
        {
            if (r === 0 && c === 0) return false;
            const fc = Math.floor(N/2) - 1;
            const fr = Math.floor(N/2) - 1;
            if ((r === fr || r === fr+1) && (c ===fc || c === fc+1)) return false;
            let openCount = 0;
            if (!hWalls[r][c]) openCount++;
            if (!hWalls[r+1][c]) openCount++;
            if (!vWalls[r][c]) openCount++;
            if (!vWalls[r][c+1]) openCount++;
            return openCount=== 1;
        }

        cv.addEventListener('click', e => 
        {
            const rect = cv.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (cv.width / rect.width);
            const my = (e.clientY - rect.top) * (cv.height / rect.height);
            const T = 7;

            for (let r = 1; r < N; r++)
                for (let c = 0; c < N; c++) 
                {
                    const wx = W + c * CELL, wy = r * CELL;
                    if (mx >= wx - T && mx <= wx + (CELL - W) + T && my >= wy - T && my <= wy + W + T) 
                    {
                        hWalls[r][c] = !hWalls[r][c]; 
                        pathCells = [];
                        isanimating = false;
                        animationPathind = 0;
                        draw(); return;
                    }
                }

            for (let r = 0; r < N; r++)
                for (let c = 1; c < N; c++) 
                {
                    const wx = c * CELL, wy = W + r * CELL;
                    if (mx >= wx - T && mx <= wx + W + T && my >= wy - T && my <= wy + (CELL - W) + T) 
                    {
                        vWalls[r][c] = !vWalls[r][c];
                        pathCells = [];
                        isanimating = false; 
                        animationPathind = 0;
                        draw(); return;
                    }
                }
        });
        
        function gettingMazestate()
        {
            let state = '';
            for (let r = 0; r <= N; r++)
            {
                for(let c = 0; c < N; c++)
                {
                    state += hWalls[r][c] ? '1':'0';
                }
            }
            for (let r = 0; r < N; r++)
            {
                for(let c = 0; c <= N; c++)
                {
                    state += vWalls[r][c] ? '1':'0';
                }
            }
            return btoa(state);
        }
        function loadingMazestate(encoded)
        {
            try
            {
                const state = atob(encoded);
                let idx = 0;

                for (let r = 0; r <= N; r++)
                {
                   for(let c = 0; c < N; c++)
                   {
                       hWalls[r][c] = state[idx++] === '1';
                   }
                }
                for (let r = 0; r < N; r++)
                {
                   for(let c = 0; c <= N; c++)
                   {
                       vWalls[r][c] = state[idx++] === '1';
                   }
                }

                pathCells = [];
                leftFollowPath = [];
                isanimating = false;
                animationPathind= 0;
                lockFinishWalls();
                draw();
                return true;
            }
            catch (e)
            {
                alert('Invalid maze ID.')
                return false;
            }
        }

        function copymazeID()
        {
            const mazeID = gettingMazestate();
            // const input = document.getElementById('mazeIdInput');
            // input.value = mazeID;
            // input.select();
            navigator.clipboard.writeText(mazeID).then(() =>
            {
               const btn = event.target;
               const originaltext = btn.textContent;
               btn.textContent = 'ID Copied';
               setTimeout(() => btn.textContent = originaltext, 1500)      
            });
        }
        function loadmazeID()
        {
            const input = document.getElementById('mazeIdInput');
            const mazeID = input.value.trim();

            if(!mazeID)
            {
                alert('Please enter a Maze ID.')
            }

            if(loadingMazestate(mazeID))
            {
                const btn = event.target;
                const originaltext = btn.textContent;
                btn.textContent = 'ID Loaded';
                setTimeout(() => btn.textContent = originaltext, 1500)
            }
        }
        function time()
        {
            if (pathCells.length < 2) return;
            const celltraveltime = 1.5;
            const totaltime = (pathCells.length - 1) * celltraveltime;
            document.getElementById('sTime').textContent = totaltime.toFixed(2);
        }


        generate();
    </script>
